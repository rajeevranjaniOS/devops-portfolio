server {

    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;

    index index.html;

    location / {

        try_files $uri $uri/ /index.html;

    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {

        expires 30d;

        add_header Cache-Control "public";

    }

    error_page 404 /index.html;

}