services:

  portfolio:

    image: devops-portfolio:v1

    container_name: devops-portfolio-container

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:80"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - portfolio-network

networks:
  portfolio-network: