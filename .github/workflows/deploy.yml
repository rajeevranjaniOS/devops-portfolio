###############################################################
# GitHub Actions CI/CD Pipeline
# DevOps Portfolio Website
###############################################################

name: DevOps Portfolio CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Repository Contents
        run: |
          pwd
          ls -la

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Installation
        run: |
          docker version
          docker buildx version
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify Docker Login
        run: |
          echo "Successfully authenticated with Docker Hub."
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: raranjan1711/devops-portfolio:latest

      - name: Push Docker Image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            raranjan1711/devops-portfolio:latest
            raranjan1711/devops-portfolio:${{ github.sha }}