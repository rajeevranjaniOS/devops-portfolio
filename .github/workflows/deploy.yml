###############################################################
# GitHub Actions CI/CD Pipeline
# Static Website Deployment to S3 + CloudFront
###############################################################

name: Portfolio CI/CD Pipeline
on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:

  deploy-static-site:

    name: Deploy Static Website

    runs-on: ubuntu-latest

    steps:

      #########################################################
      # Checkout Repository
      #########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # Configure AWS Credentials
      #########################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #########################################################
      # Verify AWS Authentication
      #########################################################

      - name: Verify AWS Authentication
        run: |
          aws sts get-caller-identity

      #########################################################
      # Sync Website Files to S3
      #########################################################

      - name: Sync Website to S3
        run: aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} --delete --exclude "*" --include "index.html" --include "css/*" --include "js/*" --include "images/*" --include "docs/*"

      #########################################################
      # Invalidate CloudFront Cache
      #########################################################

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      #########################################################
      # Deployment Completed
      #########################################################

      - name: Deployment Successful
        run: |
          echo "========================================"
          echo "Portfolio deployed successfully!"
          echo "S3 bucket updated."
          echo "CloudFront cache invalidated."
          echo "========================================"
